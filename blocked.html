<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erişim Engellendi</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #2a2a3a;
      --accent: #ff3f6c;
      --accent2: #7b3fff;
      --text: #e8e8f0;
      --muted: #666680;
      --green: #00e5a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 63, 108, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 63, 108, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    /* Glow effects */
    .glow-1 {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 63, 108, 0.08) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      animation: float1 8s ease-in-out infinite;
    }

    .glow-2 {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123, 63, 255, 0.08) 0%, transparent 70%);
      bottom: -80px;
      right: -80px;
      animation: float2 10s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 30px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-20px, -20px); }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 500px;
      padding: 40px 20px;
    }

    /* Shield icon */
    .shield {
      width: 100px;
      height: 100px;
      margin: 0 auto 30px;
      position: relative;
    }

    .shield-svg {
      animation: shieldPulse 3s ease-in-out infinite;
    }

    @keyframes shieldPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 63, 108, 0.3)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(255, 63, 108, 0.6)); }
    }

    /* Error code */
    .error-code {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }

    /* Main title */
    .title {
      font-size: 36px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.4s forwards;
    }

    .title span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Description */
    .description {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.6s forwards;
    }

    /* Blocked URL display */
    .blocked-url {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.7s forwards;
    }

    .blocked-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .blocked-domain {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.8s forwards;
    }

    .btn-back {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 63, 108, 0.4);
    }

    .btn-settings {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 28px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-settings:hover {
      border-color: var(--accent2);
      color: var(--text);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scan line effect */
    .scanline {
      position: fixed;
      top: -100%;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 63, 108, 0.3), transparent);
      animation: scan 4s linear infinite;
    }

    @keyframes scan {
      0% { top: -5%; }
      100% { top: 105%; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="scanline"></div>

  <div class="container">
    <div class="shield">
      <svg class="shield-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 5L10 22V50C10 71.5 27.5 91.5 50 97C72.5 91.5 90 71.5 90 50V22L50 5Z" 
              fill="url(#shieldGrad)" opacity="0.15"/>
        <path d="M50 5L10 22V50C10 71.5 27.5 91.5 50 97C72.5 91.5 90 71.5 90 50V22L50 5Z" 
              stroke="url(#shieldGrad)" stroke-width="2" fill="none"/>
        <text x="50" y="60" text-anchor="middle" font-size="28" fill="#ff3f6c">🚫</text>
        <defs>
          <linearGradient id="shieldGrad" x1="10" y1="5" x2="90" y2="97" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ff3f6c"/>
            <stop offset="100%" stop-color="#7b3fff"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="error-code">// ERİŞİM ENGELLENDİ</div>

    <h1 class="title">Bu site <span>engellendi</span></h1>

    <p class="description">
      Site Engelleyici eklentiniz bu adrese<br>
      erişiminizi engelliyor.
    </p>

    <div class="blocked-url" id="blocked-url-container">
      <span class="blocked-icon">🔒</span>
      <span class="blocked-domain" id="blocked-domain">Engellenen site</span>
    </div>

    <div class="actions">
      <button class="btn-back" id="btn-back">← Geri Dön</button>
      <button class="btn-settings" id="btn-close">Sekmeyi Kapat</button>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
