<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Engelleyici</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #ff3f6c;
      --accent2: #7b3fff;
      --text: #e8e8f0;
      --muted: #666680;
      --green: #00e5a0;
      --red: #ff3f6c;
    }

    body {
      width: 340px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-top: 1px;
    }

    /* Toggle Switch */
    .toggle-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .toggle-label {
      font-size: 9px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle input:checked + .toggle-slider {
      background: rgba(0, 229, 160, 0.15);
      border-color: var(--green);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
      background: var(--green);
      box-shadow: 0 0 8px rgba(0, 229, 160, 0.5);
    }

    /* Status Bar */
    .status-bar {
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: all 0.3s ease;
    }

    .status-dot.active {
      background: var(--green);
      box-shadow: 0 0 6px rgba(0, 229, 160, 0.6);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      transition: color 0.3s;
    }

    .status-text.active {
      color: var(--green);
    }

    .site-count {
      margin-left: auto;
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
    }

    /* Input Area */
    .input-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .input-label {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .site-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: all 0.2s;
    }

    .site-input::placeholder {
      color: var(--muted);
    }

    .site-input:focus {
      border-color: var(--accent2);
      background: rgba(123, 63, 255, 0.05);
      box-shadow: 0 0 0 3px rgba(123, 63, 255, 0.1);
    }

    .add-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .add-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(255, 63, 108, 0.4);
    }

    .add-btn:active {
      transform: scale(0.97);
    }

    /* Error message */
    .error-msg {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: var(--accent);
      margin-top: 6px;
      height: 14px;
      transition: opacity 0.2s;
    }

    /* Sites List */
    .list-section {
      padding: 12px 20px;
      max-height: 240px;
      overflow-y: auto;
    }

    .list-section::-webkit-scrollbar {
      width: 3px;
    }

    .list-section::-webkit-scrollbar-track {
      background: transparent;
    }

    .list-section::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .empty-state {
      text-align: center;
      padding: 32px 20px;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 10px;
      opacity: 0.4;
    }

    .empty-text {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      line-height: 1.6;
    }

    .site-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      transition: all 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-8px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .site-item:hover {
      border-color: var(--accent);
      background: rgba(255, 63, 108, 0.05);
    }

    .site-favicon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }

    .site-url {
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .remove-btn:hover {
      color: var(--accent);
      background: rgba(255, 63, 108, 0.1);
    }

    /* Footer */
    .footer {
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .version {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--border);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">🚫</div>
      <div>
        <div class="title">Site Engelleyici</div>
        <div class="subtitle">BLOCK_LIST v1.0</div>
      </div>
    </div>
    <div class="toggle-wrap">
      <span class="toggle-label" id="toggle-state-label">AKTİF</span>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="status-bar">
    <div class="status-dot active" id="status-dot"></div>
    <span class="status-text active" id="status-text">Engelleme aktif</span>
    <span class="site-count" id="site-count">0 site</span>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-label">// Site ekle</div>
    <div class="input-row">
      <input 
        type="text" 
        class="site-input" 
        id="site-input" 
        placeholder="örn: instagram.com"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="add-btn" id="add-btn" title="Ekle">+</button>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- Site List -->
  <div class="list-section" id="list-section">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🌐</div>
      <div class="empty-text">Henüz engellenen site yok.<br>Yukarıdan site ekleyin.</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="clear-btn" id="clear-btn">Tümünü Temizle</button>
    <span class="version">Chrome Extension</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
